        - generic [ref=e108]: 一是能源依赖。日本和韩国几乎100%依赖进口石油和天然气。霍尔木兹海峡被封锁对他们的影响要大得多，日韩的能源供应直接断裂。看看他们自己的政府储备能扛多久吧，而且他们还得陪Trump演戏，甚至天天跟着叫，制裁石油输出国俄罗斯，众所周知，做美国的敌人是危险的，而做美国的朋友则是致命的
        - generic [ref=e110]: 二是汇率。美元走强的时候，日元和韩元是亚洲里最脆弱的。韩元创17年新低，资本外流加速，外资抛售韩股换美元，形成股汇双杀的螺旋。而日元最近一个月也在俯冲，只是有一波回调明面上过得去，咱们国内资本账户管制，倒是不用担心这个
        - img "图片" [ref=e116]
        - generic [ref=e117]: 第三是半导体权重太大。尤其是韩国，三星+SK海力士占权重极高，美联储如果不降息甚至加息，科技股估值杀逻辑最先砸在这些高估值芯片股上，直接把指数拖下水。
        - generic [ref=e119]: 解释一下，科技股的价格，很大一部分不是靠现在赚多少钱撑着的，是靠"未来能赚很多钱"的预期撑着的。但这里有个关键前提：利率要低。也就是钱本身的成本要低，因为你用的是未来的钱嘛，现在美联储不降息甚至要加息。利率一上去，逻辑就反转了：钱存银行或买国债就能吃到不错的利息，那我为什么要冒险去赌一家公司五年十年后的故事？大家开始重新算账：同样是未来赚100个亿，利率低的时候我愿意出1000亿买，利率高了我只愿意出600亿，这就是估值杀——公司没变差，但钱变贵了，未来的饼就不值钱了
