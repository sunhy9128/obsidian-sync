        - generic [ref=e136]: 债券市场更吓人，德国10年期国债收益率升破3%，注意啊，收益率上升=债券价格下跌，英国借款成本触及全球金融危机以来最高水平。欧洲整体股债双杀，无处躲
        - generic [ref=e138]: 核心就一个字：气
        - generic [ref=e140]: 2022年俄乌战争之后，欧洲刚把天然气供应从俄罗斯管道气切换到中东LNG（液化天然气），主要依赖卡塔尔和其他海湾国家。结果现在中东开打，LNG设施受损，霍尔木兹海峡航运受阻，等于欧洲刚逃出俄罗斯这个坑，又掉进中东这个坑。这对欧洲工业成本和居民供暖价格是灾难性的
