          - strong [ref=e17]: 第一次大豆惨败
        - paragraph [ref=e18]: 大好我巫师，不知道本期视频能否存活，当我说出【某企业】的时候，请弹幕和评论帮我打出全称
        - paragraph [ref=e19]: 中国人全力发展卫星和核弹，因为他们知道这是确保自主独立的武器，但当中国人知道【金融】和【粮食】还能作为武器，而且威力更大时，他们已经来不及了
        - paragraph [ref=e20]: 这是一条来自20年前的外网评论，而他说的正是中国粮食金融保卫战的惨败
        - paragraph [ref=e21]: 大豆——看似随处可见的便宜货，但只有懂行的人才知道大豆在金融市场上的含金量，大豆不但是一个国家的粮食物资，更是重要的工业原料和饲料，也就是大豆是一个国家的科技树可以散开的【奇点】，生活中的太多物质，追溯到源头，就是大豆
        - paragraph [ref=e22]:
          - img "图片" [ref=e23]
        - paragraph [ref=e24]: 要知道199几年的时候，咱们在大豆这个【大宗商品】上，是出口大于进口的，也就是咱们虽然穷，但大豆并不依赖外国，不但自给自足，甚至还有出口的能力，而在2002年之后，我们每年大豆的进口量就螺旋起飞，出口量更是可以忽略不计，这还是大豆本身，而大豆相关的产业链更是哀鸿遍野
        - paragraph [ref=e25]:
          - img "图片" [ref=e26]
        - paragraph [ref=e27]: 图里的两个指标，我导出的是海关总署和统计局的数字，本篇所有数据，都来自于官方和交易所，我在搜集资料时也看到网上大量的东拼西凑的视频和文章，如果你发现我的数据和他们有很大出入，那就以我为准
        - paragraph [ref=e28]: 大豆的故事，核心依旧源于中美在贸易领域的博弈，别的媒体告诉你川普上台，中美贸易战将加剧，但巫师告诉你，贸易博弈不是从川普开始，而是从2001年一直到现在，换谁当美国总统都是这一条路
        - paragraph [ref=e29]: 2001年中国加入WTO，世界工厂的故事由此开端，廉价和勤劳的中国劳动力玩命开干，中国的贸易顺差直接起飞，海关的数据显示2001年中国对美出口【543亿】美元，从美国进口【262亿】美元
        - paragraph [ref=e30]: 你们觉得数字没概念是吧，中国从美国赚500多亿，美国从中国赚200多亿，你如果是美国人，你乐意吗，
        - paragraph [ref=e31]: 而中国这边，加入WTO，经济的枷锁被释放，沉睡的巨龙迅速苏醒，居民生活水平急速的改善，而在【吃】这个问题上，虽然那会还不能全民吃上肉蛋奶，但大豆和豆油的需求爆炸上升，只是那会儿我国的大豆产能已经崩塌，一会儿你就知道为什么，总之无论期货还是现货，我们都严重依赖芝加哥期货交易所，记住这个交易所啊
        - paragraph [ref=e32]: 在国际贸易顺差，也就是美国巨大的不满，加之我国巨大的大豆缺口下，中国在此次博弈中，为了顾全大局，为了整个经济板块融入国际贸易，放弃了大豆的防御政策
        - paragraph [ref=e33]: 加入世界贸易组织之后，大豆成为首批开放的产品，3%的关税根本无法阻挡蜂拥而入的进口大豆，国产大豆被当头一棒，因为相较于进口大豆，我们的大豆真的没什么竞争优势，为什么呢，因为进口的大豆出油率高，而且还便宜，根据《全国农产品成本收益资料汇编》，可以看到各个年份下，美国大豆单价都比中国大豆便宜的多，个别年份比如2003年，美国大豆只有中国大豆的一半价格还不到
        - paragraph [ref=e34]:
          - img "图片" [ref=e35]
        - paragraph [ref=e36]: 同时根据早期的《中国饲料工业年鉴》，早期中国大豆出油率为16.5％， 而进口大豆普遍在18%以上
        - paragraph [ref=e37]: 又便宜又好的进口大豆很快就击败了国产大豆，国内的豆农们根本卖不上价，只能纷纷放弃大豆种植，国产大豆产能进一步萎缩，陷入恶性循环，导出统计局的数据，中国大豆产量自2003年起开始暴跌，并且此后一直一蹶不振，而这就是后面更大的故事造成的了
        - paragraph [ref=e38]:
          - img "图片" [ref=e39]
        - paragraph [ref=e40]: 巫师又拉出了中国大豆的收获面积作为交叉验证，收获面积也是一路跳水，从2000年到2014年也跌了得有1/3
        - paragraph [ref=e41]:
          - img "图片" [ref=e42]
        - paragraph [ref=e43]: 进口大豆成本低，得益于美国对农民的补贴和农业现代化投入，美国农场的机械化生产已经被国内的媒体大吹特吹过无数遍了，巫师就不再赘述
        - paragraph [ref=e44]: 而很多中国企业说美豆质量好，这个事儿也地狱的，其大豆品种其实来源于包含中国在内的亚洲地区，早年在1920-1930，美国从我国东北、韩国和日本引进品种资源，并从来自中国的大豆种质中系选出了以下品种，看这些名字你就可以看出浓重的东方元素，真是阿美莉卡版本的【师夷长技以制夷】了
        - paragraph [ref=e45]: “Richland”“Dunfield”、“Mukden”、“Peking”、“CNS”
        - paragraph [ref=e46]: 而1960年后，巴西在美国品种基础上，研制出了“热带大豆”新品种，但这个版本的大豆也没有中国大豆能打
        - paragraph [ref=e47]: 直到一项技术的降维打击，就是转基因，而把这套理论体系在商业化落地的就是孟山都，1994年孟山都培育的转基因大豆被批准商业化种植，转基因充满了争议，但其确实也是纯纯的【机械降神】，就是我把四个最牛逼的特性集合在一个品种上，耐除草剂+抗虫+高油酸+抗旱，四个buff拉满，而孟山都也是用这一手间接控制了巴西和阿根廷的大豆产区，世界前三大主产地：美国、巴西、阿根廷绝大部分都是转基因品种，至此，美国的资本们，完成了这套机械化+信息化的，现代生物育种+现代农业体系，大豆产业的神，已然出现
        - paragraph [ref=e48]: 面对“神”，中国大豆在商业价值上，自然被秒杀，更严重的问题来了，我国农民种豆积极性严重下降，刚刚说到陷入了恶性循环，而为追求更高的经济效益，农民逐渐放弃传统【粮豆轮作】的方式，不仅减少大豆产量，而且连续不换茬种植玉米，这样会造成玉米减产，但就这，也比种大豆强，可想而知大豆产业的衰退
        - paragraph [ref=e49]: 但在舆论上，这场衰退其实不算什么，因为我们还可以说我们是战略性放弃大豆，比如是为了调和和美国的经贸关系，或者也可以解释为在能力有限的情况下，我们是为了力保大豆以外的主粮产量，巫师觉得这两个论调都有道理
        - paragraph [ref=e50]: 如果说大豆的衰退我们还有借口，那下面第二个战役就彻彻底底的被薄纱加羞辱，而且至今没缓过来，还处于被外资控制的状态，就是豆油
        - heading [level=1] [ref=e51]:
          - strong [ref=e52]: 豆油惨败
        - paragraph [ref=e53]: 其实外资一上来就不是只冲着你的大豆去的，而是整个大豆的产业，这就说到背后挑起围猎的巨头们到底是谁，刚刚讲的全球的大豆育种和生产体系背后的资本几乎全部来自美国，或者说整个粮食产业，从种子，到种植，到加工，到销售，到你的餐桌，再到你的嘴里，背后是五座神龛，即美国ADM、美国邦吉、美国嘉吉、法国路易达孚和美国孟山都，巫师的视频中简称【五神】，很多媒体都只会人云亦云的说四大粮商，但孟山都这个市值看上去没他们大的存在，却是种子和杀虫剂等关键节点的轴承，他是让外资粮商完成机械飞升的基础，而长期以来，凭借对主产区种子的把持，甚至包括对中国大豆产区种子的把持，孟山都的盈利数据也是相当亮眼
        - paragraph [ref=e54]: 当然，我国在水稻方面也有一个让作物完成机械飞升的神将，大家都知道袁隆平，而大家不知道的是，其实我国在大豆领域，也差点有个神，这里埋个伏笔
        - paragraph [ref=e55]: 中美的外贸博弈下，打开了大豆的大门，同时也打开了五神围猎中国的通路，时间回到2003年底
        - paragraph [ref=e56]: 刚刚说到正值白宫对中国的巨大贸易顺差感到不满，而我国方面在大豆进口政策上释放善意，同时，我国组建贸易团前往美国采购大豆
        - paragraph [ref=e57]: 中国贸易团是2003年底去的，而就在贸易团动身前的第三季度，美国农业部调低大豆库存和产量数据，原因是说当年温度和降雨影响，大豆显著减产，而此时市场感受到了大豆的稀缺，大豆价格开始上涨，在贸易团去之前先炒作一轮大豆稀缺的议题，很多人觉得，为了多赚钱嘛，这一点无可厚非，但殊不知这背后可是【既要你的钱，还要你的命】
        - paragraph [ref=e58]: 初始阶段就已经有国际粮食开始惜售大豆并抬价，而期货市场的投机者开始集体做多大豆期货
        - paragraph [ref=e59]: 还记得刚刚说的芝加哥期货交易所吗，其大豆期货在8月直接起飞，而刚好美国农业部也是8月调整的大豆产量，这时是2003年8月，记住这个日期啊，一会儿还有高手
        - paragraph [ref=e60]: 现在的你可能还不信美国农业部对全球大豆价格的掌控力，没事我们继续看，2003年8月起大豆价格从最低的509美分/蒲式耳，一直涨到12月的800美分/蒲式耳，右上角CBOT大豆中的CBOT，就是就是芝加哥期货交易所的缩写
        - paragraph [ref=e61]:
          - img "图片" [ref=e62]
        - paragraph [ref=e63]: 其报价单位，蒲式耳就是英斗，主要用于量度农产品
        - paragraph [ref=e64]:
          - img "图片" [ref=e65]
        - paragraph [ref=e66]: 而不同的农产品对蒲式耳的定义不同，所以你别管这个单位具体是什么，看数就行
        - paragraph [ref=e67]:
          - img "图片" [ref=e68]
        - paragraph [ref=e69]: 很多文章视频说2003年8月美国公布大豆紧缺是【做局】，或者是人为制造恐慌，甚至说美国造假炒噱头，巫师的评价是，那后半句必然是搬起石头砸自己的脚吧？
        - paragraph [ref=e70]: 巫师认为别动不动就一切责任都怪美方，我们还是客观的去追溯，当时确实有美国炎热干旱的新闻，而且拉出那会儿的美豆主产区产量，那次干旱确实严重影响了03/04年度的大豆单产水平，单产就是每公顷能产出多少千克的大豆的意思，所以减产是事实，而价格在此刺激下疯涨也是事实
        - paragraph [ref=e71]:
          - img "图片" [ref=e72]
        - paragraph [ref=e73]: 面对持续上涨的价格，很多中国企业一开始是拒绝的，减少进口用量，用库存的大豆来维持日常生产，虽然贸易团过去了，但也不是就一定要买，毕竟价格涨的这么猛，这也是为什么2003年下半年中国对美国的大豆进口减少，中国企业认为此次涨价很快就会过去，耗着呗，看谁先坐不住，只是在苦苦支撑了几个月后，还是中国的企业先坐不住了
        - paragraph [ref=e74]: 首先是咱们自己产的大豆，下一批得隔年的9月才能收获了，网上还有说6月的，巫师不是农业专业，我也无法判断，为了确保本篇可以碾压网络上乱七八糟的视频文章，巫师尽量做到严谨，万万没想到自己有一天要学大豆种植，本表整理了中、美、巴西、阿根廷的大豆种植周期，如有错误可在评论区指正，总体来看有点豁然，其实中国和美国的品种都在9-11月收获，但是巴西和阿根廷的大豆可早在3-5月就收获了
        - paragraph [ref=e75]:
          - img "图片" [ref=e76]
        - paragraph [ref=e77]: 所以在整个中国，面对还有大豆库存开始紧张的情况下，自己国内产的大豆下一轮收获更是遥遥无期，进一步，在大豆产业上下游的企业圈子里，大家开始恐慌了，中国没有大豆了，这种消息开始蔓延，在微妙的情绪下，在生产的迫在眉睫下，作为一家企业，大家没想到整个市场真的买不到原料了，企业的生存受到了威胁，中国企业开始向海外出手
        - paragraph [ref=e78]: 而根据中国经济网的报道，在价格涨到800的12月，中美双方的大豆贸易谈判进入关键里程碑。美方坚持采用芝加哥期货交易所的期货价格作为定价基础，但这没有打消中国企业大量采买的意愿，确实家里没粮了
        - paragraph [ref=e79]: 根据新闻，一批中国企业已经和国际粮食谈好意向，12月18日下午签字仪式在芝加哥期货交易所举行，美国各大媒体到场，同时到场的还有ADM、路易达孚、邦吉、嘉吉等【五神】的企业代表，但是当场并没有敲定大豆的单价，其定价方式是期货价格＋升贴水，当场只敲定了【升贴水】
        - paragraph [ref=e80]: 巫师解释一下，升贴水其实是升水和贴水，也就是商品现货和期货的价差，价差包括了运输费用，税费，保险费，仓储费等等，比如某大宗商品期货价格为10万/吨，但这个商品真正运过来的实际成本一算，怎么得有个13万/吨，这个差值3万，就是那天中美代表团敲定的数，也就是敲定了个差值，但具体大豆按什么价格，还得看到时候大豆期货的价格，再算上升水或者贴水，所以，为什么那些需要大量采购大宗商品的企业都要会用【套期保值】的操作，就是因为从海外采购，都要涉及到预测未来价格，所以采购部门的人也往往都是期货交易所里的老油条
        - paragraph [ref=e81]: 而这儿，就是中国企业们的噩梦的开始，中国代表团在美国签下大单的消息被疯传，这进一步刺激了大豆价格
        - paragraph [ref=e82]: 从2003年12月到2004年的4月份，大豆价格继续一路猛涨，从800直接冲上了1000，创出了近16年的新高，而与此同时，人民日报社旗下的《民生周刊》也报道了中国代表团的“战绩”，原话是4月9日中国代表团在美国以每吨4100元的价格达成协议，当然也有其他报道称是12或3月敲定价格，而价格也有不同的报道给出不同的数字，比如1055美分/蒲式耳，或者4300元/吨
        - paragraph [ref=e83]: 这些日期和数字其实相差不大，所以巫师就直接采信《民生周刊》的报道，大豆从美国运到中国港口消耗了一个多月，就在这段时间，大豆价格出现了历史上最有节目效果的反转，2004年5月起，大豆的价格突然暴跌，分别在五月和六月完成了两次直线跳楼，趋势在9月有所回暖，但又被打了下去，一直到2004年11月，从1056跌到了505，事实上腰斩
        - paragraph [ref=e84]:
          - img "图片" [ref=e85]
        - paragraph [ref=e86]: 当时的分析师给出了诸多大豆暴跌的原因，比如南美大豆丰收，美国大豆播种扩张等等，但巫师这里说重点，依旧是美国农业部的那份月报，五月份的月报一改之前持续的悲观态度，还记得之前大豆为什么涨吗，就是美国农业部报告中对于全球大豆的供给和需求的判断，之前2003年8月的判断是供给遭受天气原因大幅下降，而2004年5月之后，该月报的倾向性完成掉头，也就是供给大幅上升
        - paragraph [ref=e87]: CBOT大豆在美国农业部利空预期下掉头直下，关于美国农业部报告和CBOT大豆期价的关系，巫师可以引用知网上一篇论文的实验数据
