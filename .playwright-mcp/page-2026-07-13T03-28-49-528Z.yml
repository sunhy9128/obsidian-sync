        - paragraph [ref=e253]: 我们进行这种主权国家级别的储备威慑，并不是让粮价涨，也不是为了让粮价跌，而为了两个大字【稳定】，这个阳谋下，价格越高，我越卖，价格越低我越买，因为我不但有深不见底的粮食储备，而且还有主权国家级别的外汇储备，而我在【香港金融保卫战】里也说了，我们能够打赢香港金融保卫战，来自于主权国家级对香港市场的兜底，所有国际空头在面对一个主权国家的外汇储备时，都要掂量掂量，空军的人心开始产生动摇，当空军的信心开始出现裂痕，这个向下的【势】就会越发疲软，而所谓的空军们，也是数十个国际柚子，也就是对冲基金们而组成的、各怀鬼胎的精致利己个体，还是巫师那句话，他们并没有什么民族性，根本目标都是【逐利】，所以只会谁赢了帮谁，很多时候，不是主权国家下场打跑了这些空军，而是【主权国家要下场】这个信号本身，让市场信心反转，空军一哄而散
        - paragraph [ref=e254]: 金融市场背后的本质是一个个逐利的【人】，资本市场的对抗，书本里教你的那些【什么叫信用】，【什么叫利率】，【什么叫做空】等等，其实很肤浅，他们会加上繁琐的公式和函数，解释一堆你听不懂的名词，搞得很高级和复杂，让你以为金融是一个不得了的学科，但这些恰恰只是是金融行业肤浅的表层，而深层其实就是人心和人性的对抗，没那么复杂
        - paragraph [ref=e255]: 小麦玉米大豆大米等等，其实背后遵从同一个逻辑，而说回大豆，大豆那么惨不单单是因为产能和产业链的失控，也是大豆相关技术并不领先，你们不知道咱们的杂交小麦技术连续突破甚至已经走向海外，但你一定知道袁隆平的杂交水稻，袁老确实属于【天级】了，这里不再赘述，其实大豆也差点有个【天级】的，这里还有个小插曲
        - heading [level=1] [ref=e256]:
          - strong [ref=e257]: 大豆的袁隆平
        - paragraph [ref=e258]: 2002年，在山东莱阳，几个混混因为没钱上网，抢劫并杀害了某路人，这位遇害的路人，叫庄炳昌，这个案件震惊全国，媒体评价是这几个混混直接毁了莱阳这座城，不但追责该城从上到下各级干部，官员大换血，而且莱阳此后失去大量的机会和资源，甚至让这个被称为“中国梨乡”、“中国书法之乡”的莱阳发展进入停滞
        - paragraph [ref=e259]: 这个叫庄炳昌的什么来头，被害后为什么能掀起这么大的波澜，巫师用三张图来告诉你答案，庄炳昌是我国农学领域的顶尖专家，巫师去搜了搜其相关著作，这下你们明白了吧，大豆遗传图谱构建和分析、大豆种质多样性和遗传变异性分析、利用rRNA基因ITS-I序列构建的大豆属( Glycine )12个种的种系关系、等等等，庄炳昌同志，巫师可以简单概括为：很有可能成为大豆界的袁隆平的存在
        - paragraph [ref=e260]:
          - img "图片" [ref=e261]
          - img "图片" [ref=e262]
          - img "图片" [ref=e263]
        - paragraph [ref=e264]: 只是这四个混混不只是一刀捅死了一个城市的经济发展，更是一刀砍断了中国大豆基因技术研究的大动脉，一度让多项研究停滞，多个研究成果半途而废，多项本来可以实现的技术化为泡影，多年的积累和努力化为灰烬，也给中国本来就疲软的大豆，被控制、被围攻的大豆，雪上加霜
        - paragraph [ref=e265]: 根据报道，行凶者分别被判处了死刑，死缓，有期徒刑十年和三年
        - paragraph [ref=e266]: 然而再严厉的处罚，也换不回对中国大豆科技树的伤害，有报道称，当时的侦破工作中还怀疑过这是不是其他国家为了遏制我国科技树，对我国高级科研人员的精准打击，然而事实证明，这几个混混居然就真只是为了弄点网费，造化弄人，或者说，造化弄国
        - heading [level=1] [ref=e267]:
          - strong [ref=e268]: 金融和舆论的博弈
        - paragraph [ref=e269]: 而到如今，大豆的博弈还在继续，我国大豆的产能其实还没有真正意义上实现突破，依旧大量依赖进口，同时大豆的产业链里，尤其是压榨产业，依旧以外资为主，很多人觉得这几年大豆相关的新闻少了，是不是消停了，根本不是，只是博弈的手段更丰富了
        - paragraph [ref=e270]: 比如2024年7月爆发的一些关于粮油安全性的舆情，其背后错综复杂的外资参与方，可见一斑
        - paragraph [ref=e271]: 但这边还需要从长计议，既要保证现有市场价格稳定，又要保证外资在华的合理利益，又要顾忌原料的稳定，其中还有千丝万缕的利益关系、舆论、立法、经销商体系、食品安全、营商环境、专利和商标、中美关系、甚至对通胀的影响，这些哪个不够你喝一壶的，大豆这里水下的博弈将会持续更久
        - paragraph [ref=e272]: 巫师最后提供一个新的视角
        - paragraph [ref=e273]: 我在解读三中全会的一个小时的视频里说了，中国坚持改革开放路线不动摇，持续开放和吸引外资投资，积极和全世界展开贸易，但关系到中国人根本生存安全的产业比如能源和粮食，得拿在自己手里
        - paragraph [ref=e274]: 很多人以为这些命脉掌握在自己手里，理所应当天经地义，巫师告诉这可不是天经地义，世界上绝大多数国家，这些命脉并不掌握在自己手里，你想不被牵制，先得掉一层皮，付出血的代价
        - paragraph [ref=e275]: 教员不只是成立新中国，新中国这三个字太广泛了太抽象了，我不喜欢，我说个具体的，其中重要一步是用一代人的血肉清除了买办和海外资本在华的既得利益体系
        - paragraph [ref=e276]: 你以为每个国家自己都能掌握自己的粮食、能源、金融、军事等等关键命脉吗，开玩笑，都是拿人命和鲜血换回来的
        - paragraph [ref=e277]: 而粮食产业在今天依旧在金融市场和舆论市场真刀真枪的肉搏，每隔几天就要有个舆情，外网新闻更是日常“人类粮食危机”，我们也是见怪不怪了，而国内外的大宗期货的资本市场玩家们，也是虎视眈眈，各种农产品各种离奇的价格行情我们也经历了多轮，我写稿的时候是2024年（写稿写了很久，发出来可能2025了），也就是建国都75年了，还是没完没了
        - paragraph [ref=e278]: 当你知道单就大豆这一个产业链的博弈就这么费劲，甚至被暴打了多次，你就能理解为什么当初玩了命的清理关键命脉产业的既得利益体系，是何等壮举了
        - paragraph [ref=e279]: 言止于此，下期见
